name: Bygg og Deploy Rekrutteringsbistand-frontend
on:
  push:
  workflow_dispatch: # Legger til mulighet for manuell kjøring

jobs:
  build-and-deploy:
    name: Next
    uses: navikt/toi-github-actions-workflows/.github/workflows/build-and-deploy-nextjs.yaml@v12
    with:
      playwright-command: 'pnpm test'
      playwright-snapshots: true
      playwright-github-report: true
      a11y-command: 'pnpm a11y'
      dev-vars-path: '.nais/dev-gcp.json'
      dev2-vars-path: '.nais/dev2-gcp.json'
      prod-vars-path: '.nais/prod-gcp.json'
      deploy-dev-branch: 'stillingsprosent'
      deploy-dev2-branch: 'rekrutteringstreff-søk'
    secrets: inherit
    permissions:
      contents: write
      id-token: write
      security-events: write
      pages: write
